<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>중복 레시피 제거</title>
  <style>
    body { font-family: sans-serif; padding: 40px; max-width: 600px; margin: 0 auto; }
    .status { margin: 10px 0; padding: 10px; border-radius: 6px; }
    .ok { background: #d4edda; color: #155724; }
    .err { background: #f8d7da; color: #721c24; }
    .ing { background: #fff3cd; color: #856404; }
    button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #e67e22; color: white; border: none; border-radius: 6px; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <h2>중복 레시피 제거</h2>
  <p>같은 이름의 레시피 중 첫 번째만 남기고 나머지를 삭제합니다.</p>
  <button id="btn" onclick="run()">중복 제거 시작</button>
  <div id="log"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-init.js"></script>
<script>
function log(msg, type) {
  const div = document.createElement('div');
  div.className = 'status ' + type;
  div.textContent = msg;
  document.getElementById('log').appendChild(div);
}

async function run() {
  const btn = document.getElementById('btn');
  btn.disabled = true;

  const snapshot = await db.collection('recipes').get();
  const docs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));

  const seen = {};
  let deleted = 0;

  for (const doc of docs) {
    if (seen[doc.title]) {
      await db.collection('recipes').doc(doc.id).delete();
      log(`"${doc.title}" 중복 삭제 ✓`, 'ok');
      deleted++;
    } else {
      seen[doc.title] = true;
    }
  }

  if (deleted === 0) {
    log('중복 없음 — 모든 레시피가 정상입니다.', 'ing');
  } else {
    log(`완료! 중복 ${deleted}개 삭제됐습니다. 이 페이지는 닫으셔도 됩니다.`, 'ok');
  }
}
</script>
</body>
</html>
