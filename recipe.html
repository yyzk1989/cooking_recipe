<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>레시피</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header no-print">
  <div class="header-inner">
    <a href="index.html" class="site-title" style="color:#fff;">요리 레시피</a>
  </div>
</header>

<div class="recipe-detail" id="recipeDetail">
  <div style="text-align:center;padding:60px;color:#999;">불러오는 중...</div>
</div>

<script src="data/recipes.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/app.js"></script>
<script>
  async function init() {
    const id = getUrlParam('id');
    const recipe = await getRecipeById(id);
    const detail = document.getElementById('recipeDetail');

    if (!recipe) {
      detail.innerHTML = `
        <p style="text-align:center;padding:60px;color:#999;">레시피를 찾을 수 없습니다.</p>
        <div style="text-align:center;"><a href="index.html" class="btn btn-secondary">목록으로</a></div>
      `;
      return;
    }

    document.title = recipe.title + ' - 요리 레시피';

    const ingredientsHtml = (recipe.ingredients || []).map((ing, i) => `
      <li id="ing_${i}">
        <input type="checkbox" id="chk_${i}" onchange="toggleIngredient(${i})">
        <label for="chk_${i}">${ing}</label>
      </li>
    `).join('');

    const stepsHtml = (recipe.steps || []).map(step => `<li>${step}</li>`).join('');

    detail.innerHTML = `
      <a href="index.html" class="back-btn no-print">← 목록으로</a>

      <div class="recipe-header">
        <span class="category-badge">${recipe.category}</span>
        <h1>${recipe.title}</h1>
        <div class="recipe-actions no-print">
          <button class="btn btn-secondary" onclick="window.print()">인쇄</button>
          <a href="admin.html?edit=${recipe.id}" class="btn btn-secondary">수정</a>
        </div>
      </div>

      <div class="ingredients-section">
        <div class="section-title">재료</div>
        <ul class="ingredient-list">${ingredientsHtml}</ul>
      </div>

      <div class="steps-section">
        <div class="section-title">만드는 법</div>
        <ol class="steps-list">${stepsHtml}</ol>
      </div>
    `;
  }

  function toggleIngredient(i) {
    const li = document.getElementById('ing_' + i);
    const chk = document.getElementById('chk_' + i);
    li.classList.toggle('checked', chk.checked);
  }

  init();
</script>

</body>
</html>
